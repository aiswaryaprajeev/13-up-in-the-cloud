<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Dictionary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 520px;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .search {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
 }

    input:focus {
      border-color: #4f46e5;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .result {
      margin-top: 20px;
    }

    .word {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .meaning {
      margin-bottom: 14px;
    }

    .pos {
      font-style: italic;
      color: #555;
      margin-bottom: 6px;
    }

    .definition {
      background: #f8fafc;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

.error {
      color: #dc2626;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>📖 Simple Dictionary</h1>

    <div class="search">
      <input id="wordInput" type="text" placeholder="Enter a word..." />
      <button onclick="searchWord()">Search</button>
    </div>

    <div id="output" class="result"></div>
  </div>

  <script>
    async function searchWord() {
      const word = document.getElementById("wordInput").value.trim();
      const output = document.getElementById("output");

      output.innerHTML = "";

      if (!word) {
        output.innerHTML = `<div class="error">Please enter a word.</div>`;
        return;
      }

      try {
        const response = await fetch(
          `https://api.dictionaryapi.dev/api/v2/entries/en/${word}`
        );

        if (!response.ok) {
          throw new Error("Word not found");
        }

        const data = await response.json();
        const meanings = data[0].meanings;

let html = `<div class="word">${word}</div>`;

        meanings.forEach(m => {
          html += `
            <div class="meaning">
              <div class="pos">${m.partOfSpeech}</div>
          `;

          m.definitions.forEach(d => {
            html += `<div class="definition">${d.definition}</div>`;
          });

          html += `</div>`;
        });

        output.innerHTML = html;

      } catch (err) {
        output.innerHTML = `
          <div class="error">
            ❌ No definition found for "${word}"
          </div>
        `;
      }
    }
  </script>

</body>
</html>
